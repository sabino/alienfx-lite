name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build solution
        shell: pwsh
        run: dotnet build .\AlienFxLite.sln --configuration Release

      - name: Build release artifacts
        shell: pwsh
        run: .\scripts\build-release.ps1

      - name: Smoke install installer
        shell: pwsh
        run: |
          $installer = Get-ChildItem .\artifacts\release\AlienFxLite-Setup-win-x64-v*.exe | Select-Object -First 1
          $installerLog = Join-Path $PWD 'artifacts\release\installer-smoke.log'
          $installProcess = Start-Process -FilePath $installer.FullName -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART',"/LOG=$installerLog" -PassThru -Wait
          if ($installProcess.ExitCode -ne 0) {
            if (Test-Path $installerLog) {
              Get-Content $installerLog
            }
            throw "Installer exited with code $($installProcess.ExitCode)."
          }

          $service = Get-Service AlienFxLiteService -ErrorAction Stop
          if ($service.Status -ne 'Running') {
            if (Test-Path $installerLog) {
              Get-Content $installerLog
            }
            throw "AlienFxLiteService is not running after installer smoke test."
          }
          .\artifacts\staging\tool\AlienFxLite.Tool.exe status
          $uninstaller = Get-ChildItem "$env:ProgramFiles\AlienFx Lite\unins*.exe" | Select-Object -First 1
          $uninstallProcess = Start-Process -FilePath $uninstaller.FullName -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' -PassThru -Wait
          if ($uninstallProcess.ExitCode -ne 0) {
            throw "Uninstaller exited with code $($uninstallProcess.ExitCode)."
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: alienfx-lite-release
          path: artifacts/release/*
